<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
    <title>主页</title>
    <!-- ========== 性能优化：预连接外部资源 ========== -->
    <link rel="preconnect" href="https://cdn.staticfile.org">
    <link rel="preconnect" href="https://images.unsplash.com">
    <script src="https://cdn.staticfile.org/vue/3.4.21/vue.global.min.js"></script>
    <style>
        /* ========================================
       CSS 变量定义 - Design Tokens
       ======================================== */
        :root {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== 浅色主题 ========== */
        :root,
        [data-theme="light"] {
            --primary: #fb7299;
            --primary-hover: #fa618a;
            --primary-rgb: 251, 114, 153;
            --accent: #fb7299;
            --accent-rgb: 251, 114, 153;
            --danger: #ef4444;
            --danger-hover: #dc2626;

            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-hover: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.15);

            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-placeholder: rgba(255, 255, 255, 0.4);

            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-primary: 0 8px 25px rgba(99, 102, 241, 0.35);
            --shadow-card: rgba(99, 102, 241, 0.3);

            --card-bg: rgba(255, 255, 255, 0.06);
            --card-bg-hover: rgba(255, 255, 255, 0.12);
            --card-border: rgba(255, 255, 255, 0.1);

            --modal-bg: linear-gradient(145deg, rgba(30, 30, 50, 0.95), rgba(20, 20, 35, 0.95));
            --modal-border: rgba(255, 255, 255, 0.15);

            --input-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.15);
            --input-border-focus: var(--primary);

            --scrollbar-track: rgba(255, 255, 255, 0.05);
            --scrollbar-thumb: rgba(255, 255, 255, 0.2);
            --scrollbar-thumb-hover: rgba(255, 255, 255, 0.3);

            --header-bg: rgba(255, 255, 255, 0.06);
            --overlay-bg: rgba(0, 0, 0, 0.2);

            --gradient-primary: linear-gradient(135deg, var(--primary), var(--accent));
            --gradient-header: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);

            --color-text-rainbow: linear-gradient(90deg, #ff6b6b, #ffd700, #42b983, #3498db, #9b59b6, #ff6b6b);
        }

        /* ========== 深色主题 ========== */
        [data-theme="dark"] {
            --primary: #fb7299;
            --primary-hover: #fa618a;
            --primary-rgb: 251, 114, 153;
            --accent: #fb7299;
            --accent-rgb: 251, 114, 153;
            --danger: #ef4444;
            --danger-hover: #dc2626;

            --glass-bg: rgba(0, 0, 0, 0.04);
            --glass-bg-hover: rgba(0, 0, 0, 0.08);
            --glass-border: rgba(0, 0, 0, 0.1);

            --text-primary: #1f2937;
            --text-secondary: rgba(31, 41, 55, 0.7);
            --text-placeholder: rgba(31, 41, 55, 0.4);

            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-primary: 0 8px 25px rgba(99, 102, 241, 0.25);
            --shadow-card: rgba(99, 102, 241, 0.15);

            --card-bg: rgba(0, 0, 0, 0.03);
            --card-bg-hover: rgba(99, 102, 241, 0.08);
            --card-border: rgba(0, 0, 0, 0.08);

            --modal-bg: linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.98));
            --modal-border: rgba(0, 0, 0, 0.1);

            --input-bg: rgba(0, 0, 0, 0.04);
            --input-border: rgba(0, 0, 0, 0.1);
            --input-border-focus: var(--primary);

            --scrollbar-track: rgba(0, 0, 0, 0.05);
            --scrollbar-thumb: rgba(0, 0, 0, 0.15);
            --scrollbar-thumb-hover: rgba(0, 0, 0, 0.25);

            --header-bg: rgba(255, 255, 255, 0.5);
            --overlay-bg: rgba(0, 0, 0, 0.1);

            --gradient-primary: linear-gradient(135deg, var(--primary), var(--accent));
            --gradient-header: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.1), transparent);

            --color-text-rainbow: linear-gradient(90deg, #ef4444, #f59e0b, #10b981, #3b82f6, #8b5cf6, #ef4444);
        }

        /* ========================================
       基础重置与布局
       ======================================== */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            /* 性能优化：fixed 在移动端有严重性能问题，改为 scroll */
            background-attachment: scroll;
            overflow-x: hidden;
            transition: background-image 0.5s ease-in-out;
            animation: bgFadeIn 1.5s ease-out;
        }

        @keyframes bgFadeIn {
            from {
                opacity: 0.8;
            }

            to {
                opacity: 1;
            }
        }

        /* 背景遮罩层 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--overlay-bg);
            z-index: -1;
        }

        /* ========== Particle Background ========== */
        /* Vue 应用容器 */
        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========================================
       Header 顶部导航栏
       ======================================== */
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            padding: 20px 30px;
        }

        .header-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            will-change: backdrop-filter;
            /* 关键优化 */
            transition: all 0.3s ease;
        }

        .header-btn:hover {
            background: var(--glass-bg-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-primary);
        }

        .header-btn:nth-child(1):hover {
            box-shadow: 0 8px 25px rgba(var(--primary-rgb), 0.4), 0 0 15px rgba(var(--primary-rgb), 0.2);
        }

        .header-btn:nth-child(2):hover {
            box-shadow: 0 8px 25px rgba(var(--accent-rgb), 0.4), 0 0 15px rgba(var(--accent-rgb), 0.2);
        }

        .header-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* ========================================
       Search Section 搜索区域
       ======================================== */
        .search-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 40px;
            animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3) translateY(-50px);
            }

            50% {
                transform: scale(1.05);
            }

            70% {
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary), var(--accent), var(--primary));
            border-radius: 18px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s ease;
            filter: blur(8px);
            /* 性能优化：提示浏览器提前准备复合层 */
            will-change: opacity, filter;
        }

        .ai-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .ai-tag {
            padding: 8px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: tagFloat 3s ease-in-out infinite, color-shift 2s linear infinite;
        }

        .ai-tag:nth-child(1) {
            animation-delay: 0s, 0s;
        }

        .ai-tag:nth-child(2) {
            animation-delay: 0.75s, 0.5s;
        }

        .ai-tag:nth-child(3) {
            animation-delay: 1.5s, 1s;
        }

        @keyframes tagFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        .ai-tag:hover {
            background: rgba(var(--primary-rgb), 0.2);
            border-color: var(--primary);
            transform: translateY(-3px) scale(1.08);
            box-shadow: 0 4px 20px rgba(var(--primary-rgb), 0.3);
            animation-play-state: paused;
        }

        .search-input {
            width: 100%;
            padding: 16px 50px 16px 24px;
            box-sizing: border-box;
            background: var(--glass-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 16px;
            backdrop-filter: blur(6px);
            will-change: backdrop-filter;
            /* 关键优化 */
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: var(--text-placeholder);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.2), 0 4px 24px rgba(var(--primary-rgb), 0.12);
            animation: searchPulse 1.5s ease-in-out infinite;
            /* 性能优化：只动画化 transform 和 opacity */
            will-change: transform, box-shadow;

        }

        .search-input:active {
            transform: scale(0.99);
        }

        @keyframes searchPulse {

            0%,
            100% {
                box-shadow: 0 0 5px rgba(var(--primary-rgb), 0.6), 0 0px 10px rgba(var(--primary-rgb), 0.4);
            }

            50% {
                box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.5), 0 0 32px rgba(var(--primary-rgb), 0.4);
            }
        }

        .search-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            color: var(--primary);
            background: rgba(var(--primary-rgb), 0.1);
        }

        .search-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        /* ========================================
       Main Content 主内容区域
       ======================================== */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 30px;
            padding: 20px 30px 40px;
            height: 45vh;
            min-height: 300px;
            background: transparent;
        }

        .site-column {
            width: 35%;
            min-width: 280px;
            box-sizing: border-box;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(5px);
            will-change: backdrop-filter;
            /* 关键优化 */
            animation: fadeInUp 0.8s ease-out backwards;
            max-height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .site-column::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gradient-header);
        }

        .site-column:nth-child(1) {
            animation-delay: 0.2s;
        }

        .site-column:nth-child(2) {
            animation-delay: 0.4s;
        }

        /* Center decoration */
        .center-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
        }

        .center-glow {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }


        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .column-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .column-title .icon {
            font-size: 22px;
            -webkit-text-fill-color: initial;
        }

        .column-title.m-loop-color-text span:not(.icon) {
            background: var(--color-text-rainbow);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: color-text 3s linear infinite;
        }

        .column-title.m-loop-color-shift span:not(.icon) {
            animation: color-shift 2s linear infinite;
        }

        /* -------- Color Text Animation -------- */
        @keyframes color-text {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        /* -------- Color Shift Animation -------- */
        @keyframes color-shift {
            0% {
                color: #ff6b6b;
            }

            25% {
                color: #ffd700;
            }

            50% {
                color: #42b983;
            }

            75% {
                color: #3498db;
            }

            100% {
                color: #ff6b6b;
            }
        }


        .add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(var(--primary-rgb), 0.3);
        }

        .add-btn:hover {
            transform: scale(1.15) rotate(90deg);
            box-shadow: 0 4px 20px rgba(var(--primary-rgb), 0.4);
        }

        .add-btn:active {
            transform: scale(0.95) rotate(90deg);
        }

        /* ========================================
       Cards Grid 网站卡片网格
       ======================================== */
        .cards-grid {
            display: grid;
            gap: 12px;
            overflow: visible;
            flex: 1;
            padding-right: 4px;
        }

        .site-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 14px 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardEnter 0.5s ease-out backwards;
            overflow: visible;
            transform-style: preserve-3d;
            perspective: 1000px;
            /* 性能优化：提示浏览器提前准备复合层 */
            will-change: transform;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: scale(0.7);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .site-card:hover {
            transform: translateY(-6px) rotateX(2deg) rotateY(-2deg);
            background: var(--card-bg-hover);
            border-color: var(--primary);
            box-shadow:
                0 12px 35px rgba(var(--primary-rgb), 0.3),
                0 0 20px rgba(var(--primary-rgb), 0.15);
        }

        .site-card::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 10px;
            background: radial-gradient(ellipse, rgba(var(--primary-rgb), 0.3), transparent);
            filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s ease;
            /* 性能优化：提示浏览器提前准备复合层 */
            will-change: opacity, filter;
        }

        .site-card:hover::after {
            opacity: 1;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .card-icon {
            width: 28px;
            height: 28px;
            margin-bottom: 6px;
            border-radius: 4px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .card-icon-fallback {
            display: none;
            font-size: 28px;
            margin-bottom: 6px;
        }

        .site-card:hover .card-icon {
            transform: scale(1.15);
        }

        .card-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            text-align: center;
            word-break: break-word;
        }

        .card-actions {
            position: absolute;
            top: -10px;
            left: -0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            gap: 4px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s ease;
            z-index: 100;
        }

        .site-card:hover .card-actions {
            opacity: 1;
            transform: scale(1);
        }

        .card-action-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }

        .card-action-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.15);
            box-shadow: 0 0 12px rgba(var(--primary-rgb), 0.5);
        }

        .card-action-btn.delete:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* Drag states */
        .site-card.dragging {
            opacity: 0.35;
            transform: scale(0.92);
            border-color: var(--primary);
            box-shadow: 0 12px 40px rgba(var(--primary-rgb), 0.4);
        }

        .site-card.drag-over {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.5);
            transform: scale(1.02);
        }

        /* ========================================
       Modal 弹窗组件
       ======================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--overlay-bg);
            backdrop-filter: blur(1px);
            will-change: backdrop-filter;
            /* 关键优化 */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal {
            width: 90%;
            max-width: 420px;
            background: var(--modal-bg);
            border: 1px solid var(--modal-border);
            border-radius: 20px;
            padding: 30px;
            animation: modalEnter 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalEnter {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-overlay {
            transition: opacity 0.3s ease;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--input-border-focus);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.15);
        }

        .form-input::placeholder {
            color: var(--text-placeholder);
        }

        .form-error {
            background: rgba(var(--danger), 0.15);
            border: 1px solid rgba(var(--danger), 0.4);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--danger);
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }

        .confirm-modal {
            max-width: 360px;
        }

        .confirm-text {
            color: var(--text-secondary);
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-cancel {
            background: var(--glass-bg);
            color: var(--text-secondary);
        }

        .btn-cancel:hover {
            background: var(--glass-bg-hover);
            color: var(--text-primary);
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.4);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        /* ========================================
       Settings Panel 设置面板
       ======================================== */
        .settings-panel {
            width: 90%;
            max-width: 800px;
        }

        .settings-section {
            margin-bottom: 24px;
        }

        .settings-section:last-child {
            margin-bottom: 0;
        }

        .settings-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .layout-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .layout-option {
            padding: 10px 18px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .layout-option:hover {
            background: var(--glass-bg-hover);
        }

        .layout-option.active {
            background: var(--gradient-primary);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.4);
        }

        .bg-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .bg-option {
            aspect-ratio: 16/10;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .bg-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .bg-option:hover {
            transform: scale(1.05);
        }

        .bg-option.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(var(--primary-rgb), 0.3);
        }

        .bg-upload {
            margin-top: 12px;
        }

        .bg-upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: var(--glass-bg);
            border: 2px dashed var(--glass-border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .bg-upload-btn:hover {
            background: var(--glass-bg-hover);
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .bg-upload-input {
            display: none;
        }

        /* ========================================
       Empty State 空状态提示
       ======================================== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ========================================
       Responsive 响应式适配
       ======================================== */
        @media (max-width: 1500px) {
            .main-content {
                flex-wrap: nowrap;
                height: auto;
                min-height: auto;
            }

            .site-column {
                width: calc(40%);
            }

            .center-area {
                display: none;
            }
        }

        @media (max-width: 1200px) {
            .main-content {
                flex-wrap: nowrap;
                height: auto;
                min-height: auto;
            }

            .site-column {
                width: calc(48%);
            }

            .center-area {
                display: none;
            }
        }

        @media (max-width: 800px) {
            .main-content {
                flex-direction: column;
                padding: 15px 20px 30px;
            }

            .site-column {
                width: 100%;
                max-height: none;
            }

            .header {
                padding: 15px 20px;
            }
        }

        @media (max-width: 480px) {
            .ai-tags {
                gap: 6px;
            }

            .ai-tag {
                padding: 6px 12px;
                font-size: 12px;
            }

            .search-input {
                padding: 14px 20px 14px 18px;
                font-size: 15px;
            }
        }

        /* ========================================
       Animations 动画定义
       ======================================== */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 5px rgba(var(--primary-rgb), 0.3);
            }

            50% {
                box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.6);
            }
        }



        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .animate-glow {
            animation: glow 2s ease-in-out infinite;
        }

        /* ========================================
       Scrollbar 自定义滚动条
       ======================================== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <button class="header-btn" @click="toggleTheme" :title="isDark ? '切换浅色模式' : '切换深色模式'">
                {{ isDark ? '🌙' : '☀️' }}
            </button>
            <button class="header-btn" @click="switchBackground" title="换背景">
                🖼️
            </button>
            <button class="header-btn" @click="showSettings = true" title="设置">
                ⚙️
            </button>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="ai-tags">
                <a v-for="link in aiLinks" :key="link.name" class="ai-tag" :href="link.url" target="_blank">
                    {{ link.icon }} {{ link.name }}
                </a>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" v-model="searchQuery" placeholder="百度搜索..."
                    @keyup.enter="doSearch">
                <button class="search-btn" @click="doSearch">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd"
                            d="M16.3451 15.2003C16.6377 15.4915 16.4752 15.772 16.1934 16.0632C16.15 16.1279 16.0958 16.1818 16.0525 16.2249C15.7707 16.473 15.4456 16.624 15.1854 16.3652L11.6848 12.8815C10.4709 13.8198 8.97529 14.3267 7.44714 14.3267C3.62134 14.3267 0.5 11.2314 0.5 7.41337C0.5 3.60616 3.6105 0.5 7.44714 0.5C11.2729 0.5 14.3943 3.59538 14.3943 7.41337C14.3943 8.98802 13.8524 10.5087 12.8661 11.7383L16.3451 15.2003ZM2.13647 7.4026C2.13647 10.3146 4.52083 12.6766 7.43624 12.6766C10.3517 12.6766 12.736 10.3146 12.736 7.4026C12.736 4.49058 10.3517 2.1286 7.43624 2.1286C4.50999 2.1286 2.13647 4.50136 2.13647 7.4026Z"
                            fill="currentColor"></path>
                    </svg>
                </button>
            </div>
        </section>

        <!-- ========================================
         Main Content 主内容区域
         ======================================== -->
        <main class="main-content">
            <!-- Learning Column 学习技术列 -->
            <!--
                【拖拽相关的事件绑定说明】

                1. cards-grid 容器上绑定:
                   - @dragover.prevent: 允许拖拽经过此处（prevent阻止默认拒绝行为）
                   - @drop: 放置操作的目标区域

                2. 每个 site-card 上绑定:
                   - draggable="true": 启用该元素的拖拽功能
                   - @dragstart: 开始拖拽时触发，传递 site对象、index、type
                   - @dragend: 拖拽结束时触发
                   - @dragenter: 拖拽进入该卡片时触发，更新 dropIndex

                3. CSS 类名切换实现视觉反馈:
                   - 'dragging': 当前正在被拖拽的卡片（自己）
                   - 'drag-over': 放置目标位置的卡片（悬停位置）

                【事件触发顺序】:
                   开始拖拽 → dragstart
                   拖拽经过 → dragover (在容器上)
                   进入卡片 → dragenter
                   放置 → drop
                   结束 → dragend
            -->
            <div class="site-column">
                <div class="column-header">
                    <div class="column-title m-loop-color-text">
                        <span class="icon">📚</span>
                        <span>学习技术</span>
                    </div>
                    <button class="add-btn" @click="openAddModal('learning')" title="新增">
                        +
                    </button>
                </div>
                <!-- 拖拽区域容器：必须阻止 dragover 默认行为才能接收 drop -->
                <div class="cards-grid" :style="gridStyle" @dragover.prevent="onDragOver($event, 'learning')"
                    @drop="onDrop($event, 'learning')">
                    <template v-if="learningSites.length > 0">
                        <!--
                            draggable="true": 让此卡片可拖拽
                            :class 动态类:
                              - dragging: 当前被拖拽的卡片（自己）→ 半透明+缩小
                              - drag-over: 放置目标卡片 → 边框高亮+放大
                        -->
                        <div v-for="(site, index) in learningSites" :key="site.id" class="site-card" :class="{
                'dragging': dragIndex === index && dragType === 'learning',
                'drag-over': dropIndex === index && dragType === 'learning'
              }" :style="{ animationDelay: (index * 0.12) + 's' }" draggable="true"
                            @dragstart="onDragStart($event, site, index, 'learning')" @dragend="onDragEnd"
                            @dragenter="onDragEnter($event, index, 'learning')" @click="openUrl(site.url)">
                            <div class="card-content">
                                <span class="card-icon card-icon-fallback">{{ site.icon }}</span>
                                <img class="card-icon" :src="getFavicon(site.url)" :alt="site.title"
                                    @load="onFaviconLoaded($event)" @error="onFaviconError($event)">
                                <span class="card-title">{{ site.title }}</span>
                            </div>
                            <div class="card-actions">
                                <button class="card-action-btn" @click.stop="openEditModal('learning', site)"
                                    title="编辑">✏️</button>
                                <button class="card-action-btn delete" @click.stop="deleteSite('learning', site.id)"
                                    title="删除">🗑️</button>
                            </div>
                        </div>
                    </template>
                    <div v-else class="empty-state">
                        <div class="icon">📖</div>
                        <p>暂无学习网站，点击"+"添加</p>
                    </div>
                </div>
            </div>

            <!-- Center decoration -->
            <div class="center-area">
                <div class="center-glow"></div>
            </div>

            <!-- Entertainment Column 日常娱乐列（拖拽逻辑同上） -->
            <div class="site-column">
                <div class="column-header">
                    <div class="column-title m-loop-color-shift">
                        <span class="icon">🏡</span>
                        <span>日常</span>
                    </div>
                    <button class="add-btn" @click="openAddModal('entertainment')" title="新增">
                        +
                    </button>
                </div>
                <div class="cards-grid" :style="gridStyle" @dragover.prevent="onDragOver($event, 'entertainment')"
                    @drop="onDrop($event, 'entertainment')">
                    <template v-if="entertainmentSites.length > 0">
                        <div v-for="(site, index) in entertainmentSites" :key="site.id" class="site-card" :class="{
                                'dragging': dragIndex === index && dragType === 'entertainment',
                                'drag-over': dropIndex === index && dragType === 'entertainment'
                            }" :style="{ animationDelay: (index * 0.10) + 's' }" draggable="true"
                            @dragstart="onDragStart($event, site, index, 'entertainment')"
                            @dragenter="onDragEnter($event, index, 'entertainment')" @dragend="onDragEnd"
                            @click="openUrl(site.url)">
                            <div class="card-content">
                                <span class="card-icon card-icon-fallback">{{ site.icon }}</span>
                                <img class="card-icon" :src="getFavicon(site.url)" :alt="site.title"
                                    @load="onFaviconLoaded($event)" @error="onFaviconError($event)">
                                <span class="card-title">{{ site.title }}</span>
                            </div>
                            <div class="card-actions">
                                <button class="card-action-btn" @click.stop="openEditModal('entertainment', site)"
                                    title="编辑">✏️</button>
                                <button class="card-action-btn delete"
                                    @click.stop="deleteSite('entertainment', site.id)" title="删除">🗑️</button>
                            </div>
                        </div>
                    </template>
                    <div v-else class="empty-state">
                        <div class="icon">🎬</div>
                        <p>暂无娱乐网站，点击"+"添加</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Edit/Add Modal -->
        <div class="modal-overlay" v-if="showEditModal" @click.self="closeModal">
            <div class="modal">
                <h3 class="modal-title">{{ editingSite ? '编辑网站' : '新增网站' }}</h3>
                <div class="form-error" v-if="formError">{{ formError }}</div>
                <div class="form-group">
                    <label class="form-label">网站名称</label>
                    <input type="text" class="form-input" v-model="editForm.title" placeholder="例如：GitHub"
                        @input="formError = ''">
                </div>
                <div class="form-group">
                    <label class="form-label">网站地址</label>
                    <input type="url" class="form-input" v-model="editForm.url" placeholder="例如：https://github.com"
                        @input="formError = ''">
                </div>
                <div class="form-group">
                    <label class="form-label">图标 (emoji)</label>
                    <input type="text" class="form-input" v-model="editForm.icon" placeholder="例如：🐙" maxlength="2">
                </div>
                <div class="form-actions">
                    <button class="btn btn-cancel" @click="closeModal">取消</button>
                    <button class="btn btn-primary" @click="saveSite">保存</button>
                </div>
            </div>
        </div>

        <!-- Confirm Dialog -->
        <div class="modal-overlay" v-if="showConfirm" @click.self="cancelDelete">
            <div class="modal confirm-modal">
                <h3 class="modal-title">确认删除</h3>
                <p class="confirm-text">确定要删除「{{ confirmTarget?.title }}」吗？</p>
                <div class="form-actions">
                    <button class="btn btn-cancel" @click="cancelDelete">取消</button>
                    <button class="btn btn-danger" @click="confirmDelete">删除</button>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div class="modal-overlay" v-if="showSettings" @click.self="showSettings = false">
            <div class="modal settings-panel">
                <h3 class="modal-title">⚙️ 设置</h3>

                <div class="settings-section">
                    <div class="settings-label">卡片布局</div>
                    <div class="layout-options">
                        <span v-for="opt in layoutOptions" :key="opt.label" class="layout-option"
                            :class="{ active: layout.rows === opt.rows && layout.cols === opt.cols }"
                            @click="setLayout(opt.rows, opt.cols)">
                            {{ opt.rows }}行 × {{ opt.cols }}列
                        </span>
                    </div>
                </div>

                <div class="settings-section">
                    <div class="settings-label">背景图片</div>
                    <div class="bg-options">
                        <div v-for="(bg, index) in backgrounds" :key="index" class="bg-option"
                            :class="{ active: currentBgIndex === index && !customBg }" :title="bg.title"
                            @click="setBackground(index)">
                            <img :src="bg.url" :alt="bg.title" loading="lazy">
                        </div>
                    </div>
                    <div class="bg-upload">
                        <label class="bg-upload-btn">
                            📁 选择本地图片
                            <input type="file" class="bg-upload-input" accept="image/*" @change="handleBgUpload">
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-danger" @click="resetAll" style="flex: 1">重置所有数据</button>
                    <button class="btn btn-primary" @click="showSettings = false" style="flex: 1">完成</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, onUnmounted } = Vue

        createApp({
            setup() {
                // 初始配置
                // 可选图标: 🌱  ⚛️ 🔭 ✨ ⚡ 🤖 🧠 💡 🔮 🚀 💬 🎯 🐴 🦊 🐱 🐶 🐼 🦁 🐸 🐵

                const aiLinks = [
                    { name: '豆包', icon: '🌱', url: 'https://www.doubao.com' },

                const learningSites = ref(createLearningSites())

                const backgrounds = ref([
                    { title: '绿色山野', url: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=1920' },
                    { title: '山川湖泊', url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920' },
                    { title: '雪山峰峦', url: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920' },
                    { title: '飞瀑流水', url: 'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=1920' },
                    { title: '林间光线', url: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920' },
                    { title: '雪山星空', url: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920' },
                    { title: '自然远景', url: 'https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=1920' },
                    { title: '森林小径', url: 'https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=1920' },
                    { title: '晨曦原野', url: 'https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?w=1920' },
                    { title: '湖光山色', url: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1920' },
                    { title: '夜间山路', url: 'https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?w=1920' },
                    { title: '晚霞余晖', url: 'https://images.unsplash.com/photo-1494500764479-0c8f2919a3d8?w=1920' },
                    { title: '热带海滩', url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920' },
                    { title: '银河星空', url: 'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=1920' },
                    { title: '极光之舞', url: 'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=1920' },
                    { title: '火山烈焰', url: 'https://images.unsplash.com/photo-1462332420958-a05d1e002413?w=1920' },
                    { title: '樱花时节', url: 'https://images.unsplash.com/photo-1522383225653-ed111181a951?w=1920' },
                    { title: '冰洞奇观', url: 'https://images.unsplash.com/photo-1483921020237-2ff51e8e4b22?w=1920' },
                    { title: '竹林幽径', url: 'https://images.unsplash.com/photo-1545569341-9eb8b30979d9?w=1920' },
                    { title: '礁石海浪', url: 'https://images.unsplash.com/photo-1439405326854-014607f694d7?w=1920' },
                    { title: '夕阳码头', url: 'https://images.unsplash.com/photo-1471922694854-ff1b63b20054?w=1920' },
                    { title: '瀑布彩虹', url: 'https://images.unsplash.com/photo-1546587348-d12660c30c50?w=1920' },
                    { title: '日出云海', url: 'https://images.unsplash.com/photo-1486870591958-9b9d0d1dda99?w=1920' },
                ])

                /* ========================================
                   1. 搜索功能
                   ======================================== */
                const searchQuery = ref('')

                const doSearch = () => {
                    if (!searchQuery.value.trim()) return
                    window.open('https://www.baidu.com/s?wd=' + encodeURIComponent(searchQuery.value), '_blank')
                }

                const openUrl = (url) => {
                    window.open(url, '_blank')
                }

                /* ========================================
                   2.5 Favicon 获取（使用 favicon.im 服务）
                   ======================================== */

                // 根据网站 URL 获取对应的 favicon 图标地址
                const getFavicon = (url) => {
                    try {
                        const domain = new URL(url).hostname
                        return `https://favicon.im/${domain}`
                    } catch {
                        return ''
                    }
                }

                // favicon 加载成功时，隐藏 emoji 备用图标，显示 favicon
                const onFaviconLoaded = (event) => {
                    event.target.style.display = 'block'
                    event.target.previousElementSibling.style.display = 'none'
                }

                // favicon 加载失败时，隐藏 favicon，显示 emoji 备用图标
                const onFaviconError = (event) => {
                    event.target.style.display = 'none'
                    event.target.previousElementSibling.style.display = 'block'
                }

                /* ========================================
                   3. 布局管理
                   ======================================== */
                const layout = ref({ rows: 3, cols: 4 })
                const layoutOptions = [
                    { rows: 2, cols: 3, label: '2x3' },
                    { rows: 3, cols: 4, label: '3x4' },
                    { rows: 4, cols: 5, label: '4x5' },
                    { rows: 5, cols: 6, label: '5x6' }
                ]

                const gridStyle = computed(() => ({
                    gridTemplateColumns: `repeat(${layout.value.cols}, 1fr)`
                }))

                const setLayout = (rows, cols) => {
                    layout.value = { rows, cols }
                    localStorage.setItem('homepage_layout', JSON.stringify({ rows, cols }))
                }

                const initLayout = () => {
                    const savedLayout = localStorage.getItem('homepage_layout')
                    if (savedLayout) {
                        layout.value = JSON.parse(savedLayout)
                    }
                }

                /* ========================================
                   4. 主题切换
                   ======================================== */
                const isDark = ref(false)

                const toggleTheme = () => {
                    isDark.value = !isDark.value
                    document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light')
                    localStorage.setItem('homepage_theme', isDark.value ? 'dark' : 'light')
                }

                const initTheme = () => {
                    const savedTheme = localStorage.getItem('homepage_theme')
                    if (savedTheme) {
                        isDark.value = savedTheme === 'dark'
                        document.documentElement.setAttribute('data-theme', savedTheme)
                    }
                }

                /* ========================================
                   5. 背景图片管理
                   ======================================== */

                const currentBgIndex = ref(0)
                const customBg = ref(false)

                const setBackground = (index) => {
                    currentBgIndex.value = index
                    customBg.value = false
                    document.body.style.backgroundImage = `url(${backgrounds.value[index].url})`
                    localStorage.setItem('homepage_bg', index)
                    localStorage.removeItem('homepage_custom_bg')
                }

                const handleBgUpload = (event) => {
                    const file = event.target.files[0]
                    if (!file) return

                    const reader = new FileReader()
                    reader.onload = (e) => {
                        const dataUrl = e.target.result
                        document.body.style.backgroundImage = `url(${dataUrl})`
                        currentBgIndex.value = -1
                        customBg.value = true
                        localStorage.setItem('homepage_bg', -1)
                        localStorage.setItem('homepage_custom_bg', dataUrl)
                    }
                    reader.readAsDataURL(file)
                }

                const switchBackground = () => {
                    const next = (currentBgIndex.value + 1) % backgrounds.value.length
                    setBackground(next)
                    customBg.value = false
                }

                // 自动切换背景定时器
                const bgTimerId = ref(null)
                const BG_SWITCH_INTERVAL = 30 * 1000 // **秒切换一次

                const initBackground = () => {
                    const savedBg = localStorage.getItem('homepage_bg')
                    const customBgData = localStorage.getItem('homepage_custom_bg')
                    if (customBgData) {
                        currentBgIndex.value = -1
                        customBg.value = true
                        document.body.style.backgroundImage = `url(${customBgData})`
                    } else if (savedBg !== null) {
                        const idx = parseInt(savedBg)
                        // 容错：索引超出范围时使用第一张背景
                        if (idx >= 0 && idx < backgrounds.value.length) {
                            currentBgIndex.value = idx
                            document.body.style.backgroundImage = `url(${backgrounds.value[idx].url})`
                        } else {
                            currentBgIndex.value = 0
                            document.body.style.backgroundImage = `url(${backgrounds.value[0].url})`
                        }
                    } else {
                        currentBgIndex.value = 0
                        document.body.style.backgroundImage = `url(${backgrounds.value[0].url})`
                    }

                    // 清理旧定时器，防止内存泄漏
                    if (bgTimerId.value !== null) {
                        clearInterval(bgTimerId.value)
                    }
                    // 启动新的定时器，自动切换背景
                    bgTimerId.value = setInterval(() => {
                        const next = (currentBgIndex.value + 1) % backgrounds.value.length
                        setBackground(next)
                    }, BG_SWITCH_INTERVAL)
                }





                const initSites = () => {
                    const savedLearning = localStorage.getItem('homepage_learning')
                    if (savedLearning) {
                        try {
                            const parsed = JSON.parse(savedLearning)
                            // 过滤掉无效数据，确保每个元素都有 id
                            learningSites.value = Array.isArray(parsed)
                                ? parsed.filter(s => s && typeof s.id !== 'undefined')
                                : createLearningSites()
                        } catch {
                            learningSites.value = createLearningSites()
                        }
                    }

                    const savedEntertainment = localStorage.getItem('homepage_entertainment')
                    if (savedEntertainment) {
                        try {
                            const parsed = JSON.parse(savedEntertainment)
                            entertainmentSites.value = Array.isArray(parsed)
                                ? parsed.filter(s => s && typeof s.id !== 'undefined')
                                : createEntertainmentSites()
                        } catch {
                            entertainmentSites.value = createEntertainmentSites()
                        }
                    }
                }

                /* ========================================
                   7. Modal 弹窗状态管理
                   ======================================== */
                const showEditModal = ref(false)
                const showSettings = ref(false)
                const editingSite = ref(null)
                const editingType = ref('')
                const editForm = ref({ title: '', url: '', icon: '🌐' })

                const openAddModal = (type) => {
                    editingType.value = type
                    editingSite.value = null
                    editForm.value = { title: '', url: '', icon: '🌐' }
                    showEditModal.value = true
                }

                const openEditModal = (type, site) => {
                    editingType.value = type
                    editingSite.value = site
                    editForm.value = { ...site }
                    showEditModal.value = true
                }

                const closeModal = () => {
                    showEditModal.value = false
                    editingSite.value = null
                    formError.value = ''
                }

                const formError = ref('')

                const saveSite = () => {
                    if (!editForm.value.title.trim()) {
                        formError.value = '请输入网站名称'
                        return
                    }
                    if (!editForm.value.url.trim()) {
                        formError.value = '请输入网站地址'
                        return
                    }
                    if (!/^https?:\/\//.test(editForm.value.url)) {
                        formError.value = '网站地址必须以 http:// 或 https:// 开头'
                        return
                    }

                    if (editingSite.value) {
                        // Update
                        const list = editingType.value === 'learning' ? learningSites : entertainmentSites
                        const index = list.value.findIndex(s => s.id === editingSite.value.id)
                        if (index !== -1) {
                            list.value[index] = { ...list.value[index], ...editForm.value }
                        }
                    } else {
                        // Add
                        const list = editingType.value === 'learning' ? learningSites : entertainmentSites
                        const newId = Math.max(0, ...list.value.map(s => s.id)) + 1
                        list.value.push({ id: newId, ...editForm.value })
                    }

                    // Persist
                    saveToStorage()
                    closeModal()
                }

                /* ========================================
                   8. 确认删除对话框
                   ======================================== */
                const showConfirm = ref(false)
                const confirmTarget = ref(null)
                const pendingDelete = ref(null)

                const deleteSite = (type, id) => {
                    const list = type === 'learning' ? learningSites : entertainmentSites
                    const site = list.value.find(s => s.id === id)
                    if (site) {
                        confirmTarget.value = site
                        pendingDelete.value = { type, id }
                        showConfirm.value = true
                    }
                }

                const confirmDelete = () => {
                    if (pendingDelete.value) {
                        const { type, id } = pendingDelete.value
                        const list = type === 'learning' ? learningSites : entertainmentSites
                        list.value = list.value.filter(s => s.id !== id)
                        saveToStorage()
                    }
                    showConfirm.value = false
                    confirmTarget.value = null
                    pendingDelete.value = null
                }

                const cancelDelete = () => {
                    showConfirm.value = false
                    confirmTarget.value = null
                    pendingDelete.value = null
                }

                /* ========================================
                   9. 本地存储持久化
                   ======================================== */
                const saveToStorage = () => {
                    localStorage.setItem('homepage_learning', JSON.stringify(learningSites.value))
                    localStorage.setItem('homepage_entertainment', JSON.stringify(entertainmentSites.value))
                }

                // 重置所有数据到默认值
                const resetAll = () => {
                    // 清空本地存储
                    localStorage.removeItem('homepage_layout')
                    localStorage.removeItem('homepage_bg')
                    localStorage.removeItem('homepage_custom_bg')
                    localStorage.removeItem('homepage_learning')
                    localStorage.removeItem('homepage_entertainment')
                    localStorage.removeItem('homepage_theme')

                    // 重置主题
                    isDark.value = false
                    document.documentElement.setAttribute('data-theme', 'light')

                    // 重置布局
                    layout.value = { rows: 3, cols: 4 }
                    document.body.style.backgroundImage = `url(${backgrounds.value[0].url})`
                    currentBgIndex.value = 0
                    customBg.value = false

                    // 重置站点数据
                    learningSites.value = createLearningSites()
                    entertainmentSites.value = createEntertainmentSites()

                    showSettings.value = false
                }
                /* ========================================
                   10. 拖拽排序功能
                   ========================================

                   【流程】dragstart → dragenter(移动) → drop(保存) → dragend(重置)

                   【核心变量】
                   - dragIndex: 被拖拽元素在数组中的索引（移动后更新为此位置）
                   - dragType: 分类（learning/entertainment）
                   - dropIndex: 放置目标索引（由鼠标位置计算）

                   【onDragEnter 位置判断】
                   根据鼠标在卡片中的 Y 轴位置：
                   - 上半部 → dropIndex = index（插到该卡片之前）
                   - 下半部 → dropIndex = index + 1（插到该卡片之后）

                   ======================================== */
                const dragIndex = ref(-1)     // 被拖拽项在数组中的索引（每次移动后更新）
                const dragType = ref('')       // 分类
                const dropIndex = ref(-1)      // 放置目标索引

                /* onDragStart: 开始拖拽，记录原始信息 */
                const onDragStart = (event, site, index, type) => {
                    dragIndex.value = index
                    dragType.value = type
                    event.dataTransfer.effectAllowed = 'move'
                    event.dataTransfer.setData('text/plain', site.id)
                }



                /* onDragOver: 允许拖拽经过（必须 preventDefault 否则 drop 不会触发） */
                const onDragOver = (event, type) => {
                    if (type !== dragType.value) return
                    event.preventDefault()
                }

                /* onDragEnter: 拖拽进入目标卡片 → 立即移动位置 */
                const onDragEnter = (event, index, type) => {
                    if (type !== dragType.value) return
                    event.preventDefault()
                    dropIndex.value = index

                    if (dropIndex.value === -1 || dragIndex.value === -1) return

                    const list = type === 'learning' ? learningSites : entertainmentSites
                    const from = dragIndex.value
                    const to = dropIndex.value

                    if (from === to) return

                    // 【关键数组操作】
                    // 1. 从原位置移除被拖拽项（splice返回被移除元素的数组）
                    const [item] = list.value.splice(from, 1)
                    // 2. 插入到新位置
                    list.value.splice(to, 0, item)

                    // 重置索引
                    dragIndex.value = index
                    dropIndex.value = -1
                }


                /* onDrop: 放置 → 保存到本地 */
                const onDrop = (event, type) => {
                    if (type !== dragType.value) return
                    event.preventDefault()
                    saveToStorage()
                    onDragEnd()
                }

                /* onDragEnd: 拖拽结束，重置所有状态 */
                const onDragEnd = () => {
                    dragIndex.value = -1
                    dragType.value = ''
                    dropIndex.value = -1
                }
                /* ========================================
                   11. 初始化 - 调用各模块初始化函数
                   ======================================== */
                onMounted(() => {
                    initTheme()
                    initLayout()
                    initBackground()
                    initSites()
                })
                // 清理定时器，防止内存泄漏
                onUnmounted(() => {
                    if (bgTimerId.value !== null) {
                        clearInterval(bgTimerId.value)
                        bgTimerId.value = null
                    }
                })

                /* ========================================
                   12. 暴露给模板的响应式状态和方法
                   ======================================== */
                return {
                    // 主题切换
                    isDark,
                    toggleTheme,
                    // 搜索功能
                    searchQuery,
                    aiLinks,
                    doSearch,
                    openUrl,
                    getFavicon,
                    onFaviconLoaded,
                    onFaviconError,
                    // 拖拽排序
                    dragIndex,
                    dragType,
                    dropIndex,
                    onDragStart,
                    onDragEnd,
                    onDragEnter,
                    onDragOver,
                    onDrop,
                    // 布局管理
                    layout,
                    layoutOptions,
                    gridStyle,
                    setLayout,
                    initLayout,
                    // 背景管理
                    backgrounds,
                    currentBgIndex,
                    customBg,
                    setBackground,
                    switchBackground,
                    handleBgUpload,
                    initBackground,
                    // 站点数据
                    learningSites,
                    entertainmentSites,
                    initSites,
                    // 重置功能
                    resetAll,
                    // Modal 弹窗
                    showEditModal,
                    showSettings,
                    editingSite,
                    editForm,
                    openAddModal,
                    openEditModal,
                    closeModal,
                    saveSite,
                    formError,
                    deleteSite,
                    showConfirm,
                    confirmTarget,
                    confirmDelete,
                    cancelDelete
                }
            }
        }).mount('#app')
    </script>
</body>

</html>
